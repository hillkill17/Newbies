<!DOCTYPE html>
<html>
<head>
  <title>Neon Bird</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: #000;
      margin: 0;
      overflow: hidden; /* Убирает скролл */
      touch-action: none; /* Отключает зум и скролл браузера */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <script>
    // Инициализация Telegram
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.disableVerticalSwipes(); // Новая фишка, отключает свайп закрытия

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Растягиваем на весь экран
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- НАСТРОЙКИ ---
    const img = new Image();
    img.src = 'https://raw.githubusercontent.com/samuelcust/flappy-bird-assets/master/sprites/yellowbird-midflap.png';
    
    // Геймплей
    let frames = 0;
    const DEGREE = Math.PI / 180;
    let currentState = 0; // 0 = Start, 1 = Game, 2 = Over
    let score = 0;
    let bestScore = localStorage.getItem('best') || 0;

    // Звуки (вибрация)
    function vibrate() {
        if (window.navigator.vibrate) window.navigator.vibrate(10);
    }

    // Управление состоянием
    const state = {
        current: 0,
        getReady: 0,
        game: 1,
        over: 2
    };

    // ОБЪЕКТ: Птица
    const bird = {
        x: 50,
        y: 150,
        width: 34,
        height: 24,
        radius: 12,
        speed: 0,
        gravity: 0.25,
        jump: 4.6,
        rotation: 0,
        
        draw: function() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            // Если картинка загрузилась - рисуем, нет - желтый квадрат
            if (img.complete) {
                ctx.drawImage(img, -this.width/2, -this.height/2, this.width, this.height);
            } else {
                ctx.fillStyle = "yellow";
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
            }
            ctx.restore();
        },
        
        update: function() {
            // Если игра идет
            if (state.current == state.game) {
                this.speed += this.gravity;
                this.y += this.speed;

                // Наклон
                if (this.speed < this.jump) {
                    this.rotation = -25 * DEGREE;
                } else {
                    this.rotation += 5 * DEGREE;
                    if (this.rotation >= 90 * DEGREE) this.rotation = 90 * DEGREE;
                }
                
                // Удар об пол
                if (this.y + this.height/2 >= canvas.height) {
                    this.y = canvas.height - this.height/2;
                    state.current = state.over;
                    vibrate();
                }
            } else {
                // Если меню - птица машет на месте
                this.y = 150 + Math.cos(frames/15) * 5; // Легкое покачивание
                this.rotation = 0;
            }
        },
        
        flap: function() {
            this.speed = -this.jump;
        },
        
        reset: function() {
            this.speed = 0;
            this.rotation = 0;
            this.y = 150;
        }
    };

    // ОБЪЕКТ: Трубы
    const pipes = {
        position: [],
        top: { x: 0, y: 0 },
        bottom: { x: 0, y: 0 },
        w: 53,
        h: 400,
        gap: 120, // Расстояние между трубами
        dx: 3, // Скорость труб
        
        draw: function() {
            for (let i = 0; i < this.position.length; i++) {
                let p = this.position[i];
                let topY = p.y;
                let bottomY = p.y + this.h + this.gap;
                
                // Рисуем просто прямоугольники (чтобы не грузить лишние картинки)
                ctx.fillStyle = "#00ff88"; // Неон
                ctx.fillRect(p.x, 0, this.w, topY + this.h); // Верхняя
                ctx.fillRect(p.x, bottomY, this.w, canvas.height); // Нижняя
                
                // Обводка
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, 0, this.w, topY + this.h);
                ctx.strokeRect(p.x, bottomY, this.w, canvas.height);
            }
        },
        
        update: function() {
            if (state.current !== state.game) return;
            
            // Добавляем трубы каждые 100 кадров
            if (frames % 100 == 0) {
                this.position.push({
                    x: canvas.width,
                    y: -250 * (Math.random() + 1)
                });
            }
            
            for (let i = 0; i < this.position.length; i++) {
                let p = this.position[i];
                p.x -= this.dx; // Двигаем влево
                
                // Коллизии (столкновения)
                let bottomPipeY = p.y + this.h + this.gap;
                
                // Проверка удара
                if (
                    bird.x + bird.radius > p.x && 
                    bird.x - bird.radius < p.x + this.w && 
                    (bird.y - bird.radius < p.y + this.h || bird.y + bird.radius > bottomPipeY)
                ) {
                    state.current = state.over;
                    vibrate();
                }
                
                // Удаление ушедших труб
                if (p.x + this.w <= 0) {
                    this.position.shift();
                    score++; // Очко!
                    score = Math.max(score, 0);
                    bestScore = Math.max(score, bestScore);
                    localStorage.setItem('best', bestScore);
                    vibrate(); // Легкая вибрация на очке
                }
            }
        },
        
        reset: function() {
            this.position = [];
        }
    };

    // РИСУЕМ ТЕКСТ (СЧЕТ И GAME OVER)
    function drawUI() {
        ctx.fillStyle = "#FFF";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        
        if (state.current == state.getReady) {
            ctx.font = "35px Arial";
            ctx.textAlign = "center";
            ctx.fillText("TAP TO START", canvas.width/2, canvas.height/2 + 50);
            
            ctx.font = "20px Arial";
            ctx.fillText("Best: " + bestScore, canvas.width/2, canvas.height/2 + 90);
        } 
        else if (state.current == state.game) {
            ctx.font = "50px Arial";
            ctx.textAlign = "center";
            ctx.fillText(score, canvas.width/2, 80);
            ctx.strokeText(score, canvas.width/2, 80);
        } 
        else if (state.current == state.over) {
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 20);
            ctx.strokeText("GAME OVER", canvas.width/2, canvas.height/2 - 20);
            
            ctx.font = "25px Arial";
            ctx.fillText("Score: " + score, canvas.width/2, canvas.height/2 + 20);
            ctx.fillText("Best: " + bestScore, canvas.width/2, canvas.height/2 + 50);
            
            ctx.font = "20px Arial";
            ctx.fillStyle = "#00ff88"; // Зеленый цвет для подсказки
            ctx.fillText("Tap anywhere to restart", canvas.width/2, canvas.height/2 + 90);
        }
    }

    // --- УПРАВЛЕНИЕ (Самая важная часть) ---
    // Один обработчик на весь экран. Никаких кнопок.
    window.addEventListener("pointerdown", function(evt) {
        switch (state.current) {
            case state.getReady:
                state.current = state.game;
                break;
            case state.game:
                bird.flap();
                break;
            case state.over:
                // Сброс всего
                bird.reset();
                pipes.reset();
                score = 0;
                frames = 0;
                state.current = state.getReady;
                break;
        }
    });
    // Дублируем для надежности на старых iOS
    window.addEventListener("touchstart", function(e) {
       e.preventDefault(); // Блокируем скролл
    }, {passive: false});


    // --- ГЛАВНЫЙ ЦИКЛ ---
    function loop() {
        // Очистка
        let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGrad.addColorStop(0, '#111');
        bgGrad.addColorStop(1, '#333');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Обновление и отрисовка
        pipes.update();
        pipes.draw();
        
        bird.update();
        bird.draw();
        
        drawUI();
        
        frames++;
        requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
